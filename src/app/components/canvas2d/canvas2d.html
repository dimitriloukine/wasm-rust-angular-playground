<div class="canvas2d-demo">
  <h2>Canvas 2D Demo</h2>
  <p>Same Rust framebuffer, rendered with Canvas 2D API (no WebGL)</p>
  <p class="monospace">
    Frame Time {{ averageFrameTime() | number: '2.1-1' }} ms, Frame Rate
    {{ averageFrameRate() | number: '4.0-0' }} fps
  </p>
  <p class="monospace">
    Peak: {{ peakFrameTime() | number: '1.2-2' }}ms Floor:
    {{ floorFrameTime() | number: '1.2-2' }}ms
  </p>
  <canvas #canvas width="640" height="480"></canvas>
</div>
